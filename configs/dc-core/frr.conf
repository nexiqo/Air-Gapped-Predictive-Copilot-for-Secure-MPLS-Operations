frr version 9.0
frr defaults traditional
hostname techcorp-dc-core
! TechCorp India Primary Data Center - Core Banking Services Hosting
! Hosting core banking applications, database servers, and critical financial services
!
interface eth1
 description "Data Center-Mumbai Core Link - Critical Banking Infrastructure"
 ip address 10.0.3.2/30
 ip ospf area 0
!
router ospf
 network 10.0.0.0/8 area 0
!
router bgp 65003
 bgp router-id 10.0.3.2
 neighbor 10.0.3.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 192.168.30.0/24
  neighbor 10.0.3.1 activate
 exit-address-family
!
