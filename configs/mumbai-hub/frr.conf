frr version 9.0
frr defaults traditional
hostname mumbai-hub-noc
! TechCorp India Mumbai Headquarters - Main Network Operations Center
! Serving 8 states across India with 20+ branch locations
!
interface eth1
 description "Mumbai-Bangalore Primary MPLS Link - Critical South Route"
 ip address 10.0.1.1/30
 ip ospf area 0
!
interface eth2
 description "Mumbai-Chennai Alternative MPLS Link - South India Operations"
 ip address 10.0.2.1/30
 ip ospf area 0
!
interface eth3
 description "Mumbai-Data Center Core Link - Banking Services Infrastructure"
 ip address 10.0.3.1/30
 ip ospf area 0
!
router ospf
 network 10.0.0.0/8 area 0
!
router bgp 65000
 bgp router-id 10.0.1.1
 neighbor 10.0.1.2 remote-as 65001
 neighbor 10.0.2.2 remote-as 65002
 neighbor 10.0.3.2 remote-as 65003
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.0.1.2 activate
  neighbor 10.0.2.2 activate
  neighbor 10.0.3.2 activate
 exit-address-family
!
