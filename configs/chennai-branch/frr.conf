frr version 9.0
frr defaults traditional
hostname chennai-branch-south
! TechCorp India Chennai Regional Branch - South India Operations
! Serving Tamil Nadu region with regional data center operations
!
interface eth1
 description "Chennai-Mumbai Alternative MPLS Link - South India Operations"
 ip address 10.0.2.2/30
 ip ospf area 0
!
interface eth2
 description "Chennai-Bangalore Inter-Branch Link - Regional Redundancy"
 ip address 10.0.4.2/30
 ip ospf area 0
!
router ospf
 network 10.0.0.0/8 area 0
!
router bgp 65002
 bgp router-id 10.0.2.2
 neighbor 10.0.2.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 192.168.20.0/24
  neighbor 10.0.2.1 activate
 exit-address-family
!
