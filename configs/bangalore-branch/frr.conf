frr version 9.0
frr defaults traditional
hostname bangalore-branch-tech
! TechCorp India Bangalore Regional Branch - Major Technology Hub
! Serving Karnataka region with 500+ ATMs and key technology operations
!
interface eth1
 description "Bangalore-Mumbai Primary MPLS Link - Critical South Route"
 ip address 10.0.1.2/30
 ip ospf area 0
!
interface eth2
 description "Bangalore-Chennai Inter-Branch Link - Regional Redundancy"
 ip address 10.0.4.1/30
 ip ospf area 0
!
router ospf
 network 10.0.0.0/8 area 0
!
router bgp 65001
 bgp router-id 10.0.1.2
 neighbor 10.0.1.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 192.168.10.0/24
  neighbor 10.0.1.1 activate
 exit-address-family
!
